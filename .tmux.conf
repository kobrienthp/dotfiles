###############################################################################
# Plugins
###############################################################################

set -g @plugin 'rose-pine/tmux'
set -g @rose_pine_variant 'moon' # Options: 'main', 'moon', 'dawn'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'


###############################################################################
# Pane splitting and navigation
###############################################################################

# Prefix + h/l: left-right split.
# Prefix + j/k: top-bottom split.
bind h split-window -h
bind l split-window -h
bind j split-window -v
bind k split-window -v

# Remove default split bindings.
unbind '"'
unbind %

# Ctrl-a, then h/j/k/l: move between panes without using the tmux prefix.
bind -n C-a switch-client -T panes
bind -T panes h select-pane -L
bind -T panes j select-pane -D
bind -T panes k select-pane -U
bind -T panes l select-pane -R


###############################################################################
# Windows
###############################################################################

# Keep manually assigned window names.
set-option -g allow-rename off

# Close gaps in window numbering after a window is closed.
set -g renumber-windows on

# Prefix + < / >: move current window left or right.
bind < swap-window -t :-
bind > swap-window -t :+


###############################################################################
# Terminal behavior
###############################################################################

# Use tmux's modern terminfo entry and enable true color.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',xterm*:Tc'

# Reduce Escape-key delay; useful for Vim/Neovim.
set -sg escape-time 10

# Forward desktop/session variables into new panes.
set -g update-environment "DISPLAY XAUTHORITY DBUS_SESSION_BUS_ADDRESS"


###############################################################################
# Copy mode
###############################################################################

set-window-option -g mode-keys vi

# Vi-style selection and copy to system clipboard via xclip.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'


###############################################################################
# Status line
###############################################################################

set -g status-position "bottom"
set -g status-justify "left"
set -g status-left ""

set -g window-status-format " #I #W "
set -g window-status-current-format " #I #W"
set -g status-right '%d.%m.%Y %H:%M'

# Optional manual styling; normally handled by Rose Pine.
# set -g window-status-style fg=white,bg=default
# set -g window-status-current-style fg=black,bg=colour131,bold


###############################################################################
# Reload config
###############################################################################

bind r source-file ~/.tmux.conf \; display "tmux reloaded"


###############################################################################
# TPM
###############################################################################

# Keep this last so TPM can load the plugin declarations above.
run '~/.tmux/plugins/tpm/tpm'

